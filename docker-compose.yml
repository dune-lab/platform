services:
  persona:
    build:
      context: ..
      dockerfile: persona/Dockerfile
    ports:
      - "13000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: persona-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: persona
      JWT_SECRET: changeme
    depends_on:
      persona-db:
        condition: service_healthy
    networks:
      - platform

  atreides:
    build:
      context: ..
      dockerfile: atreides/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      HOST: 0.0.0.0
      DB_HOST: atreides-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: atreides
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: changeme
    depends_on:
      atreides-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - platform

  janus:
    build:
      context: ..
      dockerfile: janus/Dockerfile
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      HOST: 0.0.0.0
      JWT_SECRET: changeme
      JWT_EXPIRES_IN: 1h
      ATREIDES_URL: http://atreides:3002
    depends_on:
      atreides:
        condition: service_started
    networks:
      - platform

  imperium:
    build:
      context: ..
      dockerfile: imperium/Dockerfile
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      HOST: 0.0.0.0
      JWT_SECRET: changeme
      JANUS_URL: http://janus:3003
      ATREIDES_URL: http://atreides:3002
      PERSONA_URL: http://persona:3000
      ODYSSEY_URL: http://odyssey:3001
    depends_on:
      janus:
        condition: service_started
      atreides:
        condition: service_started
      persona:
        condition: service_started
      odyssey:
        condition: service_started
    networks:
      - platform

  arrakis:
    build:
      context: ..
      dockerfile: arrakis/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      imperium:
        condition: service_started
    networks:
      - platform

  odyssey:
    build:
      context: ..
      dockerfile: odyssey/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DB_HOST: odyssey-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: odyssey
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: changeme
    depends_on:
      odyssey-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - platform

  atreides-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atreides
    ports:
      - "5435:5432"
    volumes:
      - atreides_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform

  persona-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: persona
    ports:
      - "5433:5432"
    volumes:
      - persona_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform

  odyssey-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: odyssey
    ports:
      - "5434:5432"
    volumes:
      - odyssey_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    mem_limit: 700m
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - platform

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      JAVA_OPTS: "-Xms128m -Xmx256m"
    mem_limit: 400m
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - platform

  loki:
    image: grafana/loki:2.9.10
    user: "0"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml
      - loki_data:/tmp/loki
    networks:
      - platform

  dashboard:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    networks:
      - platform

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    networks:
      - platform

  grafana:
    image: grafana/grafana:latest
    ports:
      - "4001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  atreides_db_data:
  persona_db_data:
  odyssey_db_data:
  kafka_data:
  loki_data:
  grafana_data:
